<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Parchment background — matches the actual Wanderkind logo -->
  <rect width="32" height="32" rx="4.5" fill="#FAFAF5"/>
  <!-- Concentric circle decorations (simplified from logo) -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#E8DFD0" stroke-width="0.5" opacity="0.7"/>
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#E8DFD0" stroke-width="0.4" opacity="0.4"/>
  <!-- Bold W — the primary mark -->
  <text x="16" y="23"
        text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="21"
        font-weight="900"
        fill="#C8762A"
        letter-spacing="-0.8">W</text>
</svg>
